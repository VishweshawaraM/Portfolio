<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishweshwara M | Sanskrit Scholar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL VARIABLES --- */
        :root { --bg-deep: #050505; --gold: #D4AF37; --text-main: #F5F5F5; --text-muted: #A3A3A3; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 80%); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden; 
        }

        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; }

        /* --- NAVIGATION --- */
        nav { 
            padding: 2rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: absolute; /* Floating on Desktop */
            width: 100%; 
            z-index: 10; 
        }
        
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; letter-spacing: 1px; color: #fff; text-decoration: none; }
        
        .nav-links { display: flex; gap: 2rem; } 
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .nav-links a:hover { color: var(--gold); }

        /* --- HERO SECTION --- */
        .hero { 
            min-height: 100vh; 
            display: grid; 
            grid-template-columns: 1.2fr 1fr; 
            align-items: center; 
            padding: 0 5%; 
            position: relative; 
        }

        .hero h1 { 
            font-size: 4.5rem; 
            line-height: 1.1; 
            margin-bottom: 2rem; 
            background: linear-gradient(180deg, #fff 0%, #aaa 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .hero p { font-size: 1.1rem; color: var(--text-muted); line-height: 1.8; max-width: 500px; margin-bottom: 3rem; }
        
        .btn-luxury { 
            display: inline-block; 
            padding: 1rem 2.5rem; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            text-decoration: none; 
            margin-right: 1rem; 
            margin-bottom: 1rem; 
        }
        .btn-luxury:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        .hero-img-container { 
            position: relative; 
            height: 80vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .hero-img { 
            width: 100%; 
            max-width: 480px; 
            height: auto; 
            border-radius: 200px 200px 0 0; 
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%); 
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%); 
            object-fit: cover; 
            opacity: 0.9; 
        }

        /* --- MOBILE & TABLET OPTIMIZATION --- */
        @media (max-width: 900px) {
            /* Fix Navigation: Stack it comfortably */
            nav { 
                position: relative; /* Stop floating on mobile so it doesn't overlap text */
                flex-direction: column; 
                gap: 1.5rem; 
                padding: 2rem 1.5rem;
                background: var(--bg-deep); /* Solid background for readability */
            }
            
            .nav-links { 
                gap: 1.2rem; 
                flex-wrap: wrap; 
                justify-content: center; 
            }
            
            .nav-links a { font-size: 0.75rem; }

            /* Fix Hero Layout: Stack text and image */
            .hero { 
                grid-template-columns: 1fr; 
                text-align: center; 
                padding: 2rem 1.5rem; 
                min-height: auto; /* Allow natural height */
            }
            
            .hero-content { order: 1; margin-bottom: 3rem; } /* Text first */
            
            .hero h1 { font-size: 2.8rem; margin-bottom: 1.5rem; } /* Smaller text for phone */
            .hero p { font-size: 1rem; margin: 0 auto 2rem auto; }
            
            .btn-luxury { padding: 0.8rem 1.5rem; width: 100%; margin-right: 0; } /* Full width buttons */

            /* Fix Image: Center it */
            .hero-img-container { 
                order: 2; /* Image second */
                height: auto; 
                margin-top: 0; 
                margin-bottom: 2rem;
            }
            
            .hero-img { 
                max-width: 280px; /* Perfect size for phone */
                border-radius: 150px 150px 0 0;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">VISHWESHWARA<span style="color:var(--gold)">.</span></a>
        <div class="nav-links">
            <a href="teacher.html">Profile</a>
            <a href="materials.html">Library</a>
            <a href="dakshina.html">Dakṣiṇā</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div style="color:var(--gold); letter-spacing:4px; font-size:0.7rem; text-transform:uppercase; margin-bottom:1rem; font-weight:600;">Sanskrit Scholar</div>
            <h1>Preserving the Sacred Lineage.</h1>
            <p>Expert in Vyākaraṇa, Vedānta, and the Art of Chanting. Bridging the gap between ancient Gurukula wisdom and the modern seeker.</p>
            <div>
                <a href="teacher.html" class="btn-luxury">Explore Profile</a>
                <a href="dakshina.html" class="btn-luxury" style="border-color:rgba(255,255,255,0.2);">Offer Dakshina</a>
            </div>
        </div>
        
        <div class="hero-img-container">
            <img src="Profile.jpeg" alt="Vishweshwara M" class="hero-img">
        </div>
    </section>

</body>
</html>
