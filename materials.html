<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Materials | Vishweshwara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-deep: #050505; --gold: #D4AF37; --text-main: #F5F5F5; }
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Montserrat', sans-serif; margin: 0; }
        
        nav { padding: 2rem 5%; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .logo { font-family: 'Cormorant Garamond'; color: #fff; text-decoration: none; font-size: 1.5rem; }

        .container { max-width: 800px; margin: 6rem auto; padding: 0 2rem; text-align: center; }
        
        .drive-card {
            background: linear-gradient(145deg, #111, #0a0a0a);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4rem 2rem;
            border-radius: 20px;
            transition: 0.3s;
        }
        .drive-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        h1 { font-family: 'Cormorant Garamond'; font-size: 3rem; color: var(--gold); margin-bottom: 1rem; }
        .icon-drive { font-size: 4rem; color: #fff; margin-bottom: 2rem; }
        
        .btn-access {
            display: inline-block;
            background: var(--gold);
            color: #000;
            text-decoration: none;
            padding: 1rem 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            margin-top: 2rem;
            transition: 0.3s;
        }
        .btn-access:hover { background: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">VISHWESHWARA</a>
        <a href="index.html" style="color:#aaa; text-decoration:none;">Back</a>
    </nav>

    <div class="container">
        <div class="drive-card">
            <i class="fab fa-google-drive icon-drive"></i>
            <h1>Digital Library</h1>
            <p style="color: #aaa; max-width: 500px; margin: 0 auto; line-height: 1.6;">
                Access my curated collection of Sanskrit manuscripts, grammar notes, and chanting guides via Google Drive.
            </p>
            
            <a href="https://drive.google.com/drive/folders/1pazNVJKVXanzOet1c5nyGZCZ6vZ7f6hL" target="_blank" class="btn-access">
                Open Google Drive
            </a>
        </div>
    </div>
</body>
</html>
